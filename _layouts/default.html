<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
  {% include head.html %}
  <body>
    <div class="reading-progress" id="reading-progress"></div>

    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="切换主题">
      <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="5" fill="currentColor"/>
        <path stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
        <path fill="currentColor" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>

    {% include nav.html %}

    <div class="wrapper">
      <div class="container">
        {{ content }}
      </div>
      {% include footer.html %}
    </div>

    {% include analytics.html %}

    <script src="{{ site.baseurl }}/js/theme.js"></script>
    <script src="{{ site.baseurl }}/js/main.js"></script>
  </body>
</html>
