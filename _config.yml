#
# 基本配置
#
name: 周煜的博客
description: 记录学习与思考，分享前端、小程序与独立开发实践。
url: https://928979883.github.io
baseurl: ""
permalink: /:year/:month/:day/:title/

# 站点元信息
avatar: /images/favicon.svg
favicon: /images/favicon.svg

# 社交链接（用于首页 Hero 与页脚）
footer-links:
  github: 928979883
  email: 928979883@qq.com
  weibo: zhouyuworld
  zhihu: dian-hua-ju-zi
  rss: true

# Jekyll 配置
theme: null
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Sass 压缩，提升访问速度
sass:
  style: compressed

# 分页
paginate: 5
paginate_path: "/page/:num/"

# 插件
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed

# 导航
nav:
  - name: 首页
    url: /
  - name: 关于
    url: /about/
  - name: 归档
    url: /archive/
  - name: 标签
    url: /tags/

# 分页标签
tag_page: '/tags/'

# 时间格式
date_format: "%Y-%m-%d"

# 评论已关闭（原 Gitalk 配置移除，避免暴露密钥）
gitalk: false

# 统计
busuanzi: true
