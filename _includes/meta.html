{% if page.excerpt %}
  <meta name="description" content="{{ page.excerpt | strip_html }}" />
  <meta property="og:description" content="{{ page.excerpt | strip_html }}" />
{% else %}
  <meta name="description" content="{{ site.description }}">
  <meta property="og:description" content="{{ site.description }}" />
{% endif %}

<meta name="author" content="{{ site.name }}" />
<meta name="theme-color" content="#3b82f6" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#60a5fa" media="(prefers-color-scheme: dark)">

{% if page.title %}
  <meta property="og:title" content="{{ page.title }}" />
  <meta property="twitter:title" content="{{ page.title }}" />
{% endif %}

<meta property="og:site_name" content="{{ site.name }}" />
<meta property="og:type" content="website" />
<meta property="og:url" content="{{ site.url }}{{ page.url }}" />

{# 社交分享优化：Twitter Card + 分享图 + 语言 #}
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:site" content="@{{ site.footer-links.github }}" />
<meta property="og:image" content="{{ site.url }}{{ site.avatar }}" />
<meta property="og:image:alt" content="{{ site.name }}" />
<meta property="og:locale" content="zh_CN" />
<meta property="article:author" content="{{ site.name }}" />
<link rel="canonical" href="{{ site.url }}{{ page.url }}" />
